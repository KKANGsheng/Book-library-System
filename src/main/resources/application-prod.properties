# Production profile — all secrets read from environment variables (12-factor III)
# Required env vars: DB_URL, DB_USERNAME, DB_PASSWORD
# Run with: SPRING_PROFILES_ACTIVE=prod java -jar app.jar
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/librarydb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 'validate' is safer than 'update' in prod — fails fast if schema drifts.
# Use Flyway/Liquibase for real migrations.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# HikariCP connection pool
n spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
