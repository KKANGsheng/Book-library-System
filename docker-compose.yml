services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: librarydb
      POSTGRES_USER: library
      POSTGRES_PASSWORD: librarypass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library -d librarydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----- Spring Boot app -----
  app:
    build: .
    depends_on:
      db:
        # Don't start the app until the db's healthcheck passes.
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/librarydb
      DB_USERNAME: library
      DB_PASSWORD: librarypass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
volumes:
  postgres_data: